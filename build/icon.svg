<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <circle cx="128" cy="118" r="60" fill="url(#glow)" opacity="0.08"/>

  <!-- Lightning bolt (main icon) -->
  <g filter="url(#softglow)">
    <path d="M148 40L96 136h36L108 216l76-108h-40z" fill="url(#bolt)"/>
  </g>

  <!-- Voice wave lines (left) -->
  <path d="M58 104 Q48 118 58 132" fill="none" stroke="#818cf8" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M44 92 Q28 118 44 144" fill="none" stroke="#818cf8" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Voice wave lines (right) -->
  <path d="M198 104 Q208 118 198 132" fill="none" stroke="#818cf8" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M212 92 Q228 118 212 144" fill="none" stroke="#818cf8" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>
</svg>
