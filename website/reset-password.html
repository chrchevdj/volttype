<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password — VoltType</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --purple: #6366f1;
      --purple-dark: #4f46e5;
      --text: #0f172a;
      --text-secondary: #64748b;
      --bg: #f8fafc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: white; border-radius: 16px; padding: 36px 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      width: 100%; max-width: 420px;
    }
    .logo { font-size: 38px; text-align: center; margin-bottom: 8px; }
    h1 { margin: 0 0 6px; font-size: 22px; text-align: center; }
    .sub { text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
    input {
      width: 100%; padding: 12px 14px; margin-bottom: 12px;
      border: 1px solid #e2e8f0; border-radius: 10px; font-size: 15px;
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--purple); }
    button {
      width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
      color: white; background: linear-gradient(135deg, var(--purple), var(--purple-dark));
      border: none; border-radius: 10px; cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 12px; text-align: center; }
    .msg.hidden { display: none; }
    .msg.error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
    .msg.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; }
    .back { display: block; text-align: center; margin-top: 16px; font-size: 13px; color: var(--purple); text-decoration: none; }
    .strength {
      margin-top: -6px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .bar { height: 4px; flex: 1; border-radius: 2px; background: #e2e8f0; transition: all 0.3s; }
    .strength-label { font-size: 11px; color: var(--text-secondary); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">&#x26A1;</div>
    <h1 id="title">Set a new password</h1>
    <p class="sub" id="sub">Choose a strong password to secure your account.</p>

    <div class="msg error hidden" id="error"></div>
    <div class="msg success hidden" id="success"></div>

    <form id="reset-form">
      <input type="password" id="new-password" placeholder="New password (min 8 characters)" autocomplete="new-password" required minlength="8">
      <div class="strength hidden" id="strength">
        <div class="bar" id="bar"></div>
        <span class="strength-label" id="strength-label"></span>
      </div>
      <input type="password" id="confirm-password" placeholder="Confirm new password" autocomplete="new-password" required minlength="8">
      <button type="submit" id="submit-btn">Update Password</button>
    </form>

    <a class="back" href="/">&larr; Back to VoltType</a>
  </div>

  <script>
    const SUPABASE_URL = 'https://ceuymixybyaxpldgggin.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNldXltaXh5YnlheHBsZGdnZ2luIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3ODgwNzYsImV4cCI6MjA4NzM2NDA3Nn0.OprbSZuB-wo2Q_aWnkhC0I7e7iPePT9lD8LT2BrlEWE';

    const errEl = document.getElementById('error');
    const successEl = document.getElementById('success');
    const btn = document.getElementById('submit-btn');
    const form = document.getElementById('reset-form');
    const pw = document.getElementById('new-password');
    const confirmPw = document.getElementById('confirm-password');

    // Parse Supabase recovery token from URL hash (#access_token=...&type=recovery)
    function parseHash() {
      const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : window.location.hash;
      const params = new URLSearchParams(hash);
      return {
        accessToken: params.get('access_token'),
        refreshToken: params.get('refresh_token'),
        type: params.get('type'),
        error: params.get('error_description') || params.get('error'),
      };
    }

    const { accessToken, refreshToken, type, error: urlError } = parseHash();

    if (urlError) {
      errEl.textContent = decodeURIComponent(urlError);
      errEl.classList.remove('hidden');
      form.style.display = 'none';
    } else if (!accessToken || type !== 'recovery') {
      errEl.textContent = 'This reset link is invalid or has expired. Request a new one from the sign-in page.';
      errEl.classList.remove('hidden');
      form.style.display = 'none';
    }

    // Password strength meter
    pw.addEventListener('input', () => {
      const val = pw.value;
      const strengthEl = document.getElementById('strength');
      const bar = document.getElementById('bar');
      const label = document.getElementById('strength-label');
      if (!val) { strengthEl.classList.add('hidden'); return; }
      strengthEl.classList.remove('hidden');
      const hasNumber = /\d/.test(val);
      const hasSpecial = /[!@#$%^&*]/.test(val);
      if (val.length < 8) {
        bar.style.background = '#ef4444'; label.textContent = 'Too short';
      } else if (!hasNumber && !hasSpecial) {
        bar.style.background = '#f59e0b'; label.textContent = 'Fair';
      } else {
        bar.style.background = '#22c55e'; label.textContent = 'Strong';
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('hidden');
      successEl.classList.add('hidden');

      const newPassword = pw.value;
      if (newPassword.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters';
        errEl.classList.remove('hidden');
        return;
      }
      if (newPassword !== confirmPw.value) {
        errEl.textContent = 'Passwords do not match';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating…';

      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${accessToken}`,
          },
          body: JSON.stringify({ password: newPassword }),
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error_description || data.msg || data.message || 'Could not update password');
        }
        successEl.textContent = 'Password updated. Redirecting you to sign in…';
        successEl.classList.remove('hidden');
        // Store refresh token so user is signed in after redirect
        if (refreshToken) localStorage.setItem('vt_refresh', refreshToken);
        if (accessToken) localStorage.setItem('vt_token', accessToken);
        setTimeout(() => { window.location.href = '/'; }, 2000);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
