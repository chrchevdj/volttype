name = "volttype-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "production"
ADMIN_EMAIL = "crcaway@gmail.com"

# Secrets (set via `wrangler secret put <NAME>`):
# RESEND_API_KEY        - re_... from Resend dashboard (free tier, 100/day) — welcome emails
# GROQ_API_KEY          - Paid Groq API key for STT transcription
# SUPABASE_URL          - https://ceuymixybyaxpldgggin.supabase.co
# SUPABASE_SERVICE_KEY  - Supabase service role key (from Supabase dashboard)
# SUPABASE_JWT_SECRET   - For verifying user JWTs (from Supabase dashboard)
# STRIPE_SECRET_KEY     - sk_live_... from Stripe (see .env.master)
# STRIPE_PRICE_BASIC         - price_... Basic monthly ($4.99/mo)
# STRIPE_PRICE_PRO           - price_... Pro monthly ($8.99/mo)
# STRIPE_PRICE_BASIC_ANNUAL  - price_... Basic annual ($49.99/yr ~ 17% off)
# STRIPE_PRICE_PRO_ANNUAL    - price_... Pro annual ($89.99/yr ~ 17% off)
# STRIPE_WEBHOOK_SECRET      - whsec_... from Stripe webhook endpoint signing secret
# ADMIN_EMAIL           - email allowed to access /v1/admin/stats
# Note: Checkout now uses Stripe's dashboard-configured payment methods.
# Keep cards enabled by default. Add ACH Direct Debit for eligible US subscriptions
# and SEPA Direct Debit only after creating compatible EUR pricing in Stripe.
#
# To set: wrangler secret put STRIPE_SECRET_KEY
# Then paste your sk_live_... key from .env.master or Stripe dashboard
#
# Stripe go-live notes:
# 1. Verify VoltType Basic and VoltType Pro prices are active in Stripe.
# 2. Keep card payments enabled for all customers.
# 3. Enable ACH Direct Debit in Stripe for eligible US subscriptions if desired.
# 4. Add EUR subscription prices before enabling SEPA Direct Debit for EU customers.
# 5. Run: wrangler secret put STRIPE_SECRET_KEY
# 6. Run: wrangler secret put STRIPE_PRICE_BASIC
# 7. Run: wrangler secret put STRIPE_PRICE_PRO
# 8. Run: wrangler secret put STRIPE_WEBHOOK_SECRET
# 9. Register webhook events:
#    checkout.session.completed
#    customer.subscription.created
#    customer.subscription.updated
#    customer.subscription.deleted
#    invoice.paid
#    invoice.payment_failed
# 10. Create the `volttype_webhook_events` table from `stripe-webhook-events.sql`

[observability]
enabled = true
head_sampling_rate = 1
